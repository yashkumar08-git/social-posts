<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex align-items-center" style="min-height: 100vh;">

    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-body p-5 text-center">

                        <!-- Avatar -->
                        <div class="mb-4">
                            <div class="bg-primary text-white rounded-circle d-inline-flex 
                                    align-items-center justify-content-center"
                                style="width:80px;height:80px;font-size:30px;">
                                {{ current_user[0].upper() }}
                            </div>
                        </div>

                        <h3 class="fw-bold mb-3">
                            Welcome, {{ current_user }}
                        </h3>

                        <p class="text-muted mb-4">
                            Manage your account settings below.
                        </p>

                        <!-- Action Buttons -->
                        <div class="d-grid gap-3">

                            <form method="get" action="/update_email/{{ user_id }}">
                                <button class="btn btn-primary rounded-pill">
                                    Update Email
                                </button>
                            </form>

                            <form method="post" action="/delete_account/{{ user_id }}">
                                <button class="btn btn-danger rounded-pill">
                                    Delete Account
                                </button>
                            </form>

                            <form method="post" action="/logout">
                                <button class="btn btn-outline-secondary rounded-pill">
                                    Logout
                                </button>
                            </form>

                            <a href="{{ url_for('fetch_all') }}" class="btn btn-success rounded-pill">
                                View All Users
                            </a>

                        </div>

                    </div>
                </div>

            </div>
        </div>

    </div>

</body>

</html>
